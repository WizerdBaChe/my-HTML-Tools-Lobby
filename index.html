<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML 工具大廳</title>
  <link rel="stylesheet" href="./assets/css/main.css" />
</head>
<body>
  <header class="hero">
    <h1>HTML 工具大廳</h1>
    <p>集中管理各種 HTML 小工具，支援卡片瀏覽、分類篩選、排序、精選工具與內嵌預覽。</p>
    <div class="hero-links">
      <a href="./pages/about/">關於本站</a>
      <a href="./pages/changelog/">更新紀錄</a>
    </div>
  </header>

  <main class="layout">
    <section>
      <section class="featured-panel">
        <div class="panel-head">
          <h2>精選工具</h2>
          <span class="panel-note">由 tools.json 的 featured 控制</span>
        </div>
        <div id="featuredGrid" class="featured-grid"></div>
      </section>

      <div class="toolbar-grid">
        <div class="toolbar">
          <label class="control-label" for="searchInput">搜尋</label>
          <input id="searchInput" type="text" placeholder="搜尋名稱、描述、標籤、狀態..." />
        </div>

        <div class="toolbar">
          <label class="control-label" for="sortSelect">排序</label>
          <select id="sortSelect">
            <option value="default">預設排序</option>
            <option value="name-asc">名稱 A-Z</option>
            <option value="updated-desc">最近更新優先</option>
            <option value="status">狀態排序</option>
          </select>
        </div>
      </div>

      <section class="filters-panel">
        <div class="filters-head">
          <h2>分類篩選</h2>
          <button id="resetFilters" type="button">重設</button>
        </div>
        <div id="categoryFilters" class="filter-row"></div>
      </section>

      <section class="legend-panel">
        <h2>狀態說明</h2>
        <div class="legend-row">
          <span class="status-badge status-ready">READY</span>
          <span>可正常使用</span>
          <span class="status-badge status-beta">BETA</span>
          <span>可使用，但可能仍在調整</span>
          <span class="status-badge status-draft">DRAFT</span>
          <span>雛形或開發中</span>
          <span class="new-badge">NEW</span>
          <span>近期加入或剛更新</span>
        </div>
      </section>

      <section class="panel-head">
        <h2>全部工具</h2>
        <span id="resultCount" class="panel-note"></span>
      </section>

      <section class="tool-grid" id="toolGrid"></section>
    </section>

    <aside class="preview-panel">
      <div class="preview-bar">
        <span>工具預覽區</span>
        <button id="clearPreview" type="button">關閉預覽</button>
      </div>
      <iframe id="previewFrame" src="" title="工具預覽"></iframe>
    </aside>
  </main>

  <script src="./assets/js/lobby.js"></script>
</body>
</html>

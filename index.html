<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="HTML Tools Lobby — 靜態 HTML 工具集合站，以卡片形式展示、搜尋、排序與預覽工具。" />
  <title>HTML Tools Lobby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" />
  <link rel="stylesheet" href="./assets/css/main.css" />
</head>
<body>

<nav class="nav" role="navigation" aria-label="主導覽">
  <div class="container nav__inner">
    <a href="./" class="nav__logo" aria-label="HTML Tools Lobby 首頁">
      <span class="nav__logo-mark">§</span>
      <span>Tools Lobby</span>
    </a>
    <ul class="nav__links" role="list">
      <li>
        <a href="./" class="nav__link is-active" aria-current="page">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 6.5 8 1l7 5.5V14a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1z"/></svg>
          <span>大廳</span>
        </a>
      </li>
      <li>
        <a href="./pages/about/" class="nav__link">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8" cy="8" r="7"/><path d="M8 7v4m0-6h.01"/></svg>
          <span>關於</span>
        </a>
      </li>
      <li>
        <a href="./pages/changelog/" class="nav__link">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M13 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z"/><path d="M5 6h6M5 9h4"/></svg>
          <span>更新紀錄</span>
        </a>
      </li>
    </ul>
  </div>
</nav>

<header class="hero" role="banner">
  <div class="container">
    <p class="hero__eyebrow">HTML Tools Lobby</p>
    <h1 class="hero__title">整理得很舒服的<br>工具書架</h1>
    <p class="hero__sub">靜態 HTML 小工具的集合站。找到需要的工具，直接打開用。</p>
  </div>
</header>

<main id="main-content" role="main">
  <div class="container">

    <section aria-label="搜尋與篩選">
      <div class="toolbar" role="search">
        <div class="search-box">
          <svg class="search-box__icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6.5" cy="6.5" r="5"/><path d="m11 11 3 3"/></svg>
          <input
            id="search-input"
            class="search-box__input"
            type="search"
            placeholder="搜尋工具名稱或標籤…"
            autocomplete="off"
            spellcheck="false"
            aria-label="搜尋工具"
          />
        </div>
        <label for="sort-select" class="sr-only">排序方式</label>
        <select id="sort-select" class="sort-select" aria-label="排序方式">
          <option value="order">預設排序</option>
          <option value="name">名稱排序</option>
          <option value="updatedAt">最近更新</option>
        </select>
      </div>

      <div id="filter-group" class="filter-group" role="group" aria-label="分類篩選">
        <button class="filter-btn is-active" data-category="all" aria-pressed="true">全部</button>
      </div>
    </section>

    <section id="section-featured" class="section" aria-label="精選工具" hidden>
      <div class="section__head">
        <h2 class="section__title">精選</h2>
        <div class="divider" aria-hidden="true"></div>
      </div>
      <div id="featured-grid" class="featured-grid" role="list" aria-label="精選工具"></div>
    </section>

    <section id="section-all" class="section" aria-label="全部工具">
      <div class="section__head">
        <h2 class="section__title">全部工具</h2>
        <span id="tool-count" class="section__count" aria-live="polite" aria-label="工具數量">0</span>
        <div class="divider" aria-hidden="true"></div>
      </div>
      <div id="all-grid" class="tools-grid" role="list" aria-label="工具列表"></div>
    </section>

  </div>
</main>

<footer class="footer" role="contentinfo">
  <div class="container footer__inner">
    <p class="footer__copy">© HTML Tools Lobby</p>
    <nav class="footer__links" aria-label="頁尾導覽">
      <a href="./pages/about/"     class="footer__link">關於</a>
      <a href="./pages/changelog/" class="footer__link">更新紀錄</a>
      <a href="./tools.json"       class="footer__link" target="_blank" rel="noopener">tools.json</a>
    </nav>
  </div>
</footer>

<div
  id="modal-overlay"
  class="modal-overlay"
  role="dialog"
  aria-modal="true"
  aria-labelledby="modal-title"
  aria-hidden="true"
>
  <div id="preview-modal" class="modal">
    <header class="modal__header">
      <span id="modal-title" class="modal__title">工具預覽</span>
      <button id="modal-close" class="modal__close" aria-label="關閉預覽">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="m2 2 12 12M14 2 2 14"/></svg>
      </button>
    </header>
    <div class="modal__iframe-wrap">
      <iframe
        id="modal-iframe"
        class="modal__iframe"
        src="about:blank"
        title="工具預覽視窗"
        loading="lazy"
        sandbox="allow-scripts allow-forms"
      ></iframe>
    </div>
    <footer class="modal__footer">
      <a id="modal-open-link" href="#" target="_blank" rel="noopener noreferrer" class="btn btn--primary btn--sm">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 3H3a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1V9"/><path d="M13 1h2v2m0-2L8 8"/></svg>
        在新頁開啟
      </a>
      <button class="btn btn--ghost btn--sm" onclick="document.getElementById('modal-close').click()">關閉</button>
    </footer>
  </div>
</div>

<script src="./assets/js/lobby.js"></script>
</body>
</html>

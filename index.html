<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML 工具大廳</title>
  <link rel="stylesheet" href="./assets/css/main.css" />
</head>
<body>
  <header class="hero">
    <h1>HTML 工具大廳</h1>
    <p>集中管理各種 HTML 小工具，支援卡片瀏覽、直接開啟與內嵌預覽。</p>
    <div class="hero-links">
      <a href="./pages/about/">關於本站</a>
      <a href="./pages/changelog/">更新紀錄</a>
    </div>
  </header>

  <main class="layout">
    <section>
      <div class="toolbar">
        <input id="searchInput" type="text" placeholder="搜尋工具名稱、標籤..." />
      </div>
      <section class="tool-grid" id="toolGrid"></section>
    </section>

    <aside class="preview-panel">
      <div class="preview-bar">
        <span>工具預覽區</span>
        <button id="clearPreview">關閉預覽</button>
      </div>
      <iframe id="previewFrame" src="" title="工具預覽"></iframe>
    </aside>
  </main>

  <script src="./assets/js/lobby.js"></script>
</body>
</html>
